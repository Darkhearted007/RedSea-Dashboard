kind = "mobile"
previewPath = "/mobile/"
title = "RedSea Ledger Mobile"
version = "1.0.0"
id = "artifacts/redsea-dashboard-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 21164

[services.development]
run = "pnpm --filter @workspace/redsea-dashboard-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/redsea-dashboard-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/redsea-dashboard-mobile", "run", "serve" ]

[services.env]
PORT = "21164"
BASE_PATH = "/mobile/"
