kind = "web"
previewPath = "/"
title = "RedSea Ledger"
version = "1.0.0"
id = "artifacts/redsea-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18235

[services.development]
run = "pnpm --filter @workspace/redsea-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/redsea-dashboard", "run", "build" ]
publicDir = "artifacts/redsea-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18235"
BASE_PATH = "/"
